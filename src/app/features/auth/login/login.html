<div class="sr-auth-page">
  <div class="sr-auth-box">
    <a routerLink="/" class="sr-logo">SQUAD<span>RUN</span></a>

    <h2 class="sr-auth-title">Entrar na plataforma</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="sr-form-group">
        <label class="sr-label">E-mail</label>
        <input class="sr-input" type="email" formControlName="email" placeholder="seu@email.com" />
      </div>

      <div class="sr-form-group">
        <label class="sr-label">Senha</label>
        <input class="sr-input" type="password" formControlName="password" placeholder="••••••••" />
      </div>

      @if (error) {
        <div class="sr-error" style="margin-top: 8px;">{{ error }}</div>
      }

      <button class="sr-btn-primary" type="submit" [disabled]="loading" style="margin-top: 24px; width: 100%;">
        {{ loading ? 'Entrando...' : 'ENTRAR' }}
      </button>

    </form>

    <p class="sr-auth-footer">
      Não tem conta? <a routerLink="/register">Cadastre-se</a>
    </p>
  </div>
</div>
